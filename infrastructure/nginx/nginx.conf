# ─────────────────────────────────────────────────────────────────────
# Town Meeting Manager — Production Nginx (containerized reverse proxy)
#
# This is the COMPLETE nginx.conf mounted at /etc/nginx/nginx.conf.
# Upstreams are Docker service names on the `tmm` network, re-resolved at
# request time via Docker's embedded DNS (127.0.0.11) so Nginx survives
# container restarts without a reload.
#
# Hosts:
#   app.townmeetingmanager.com       → static web SPA (admin/board UI)
#   api.townmeetingmanager.com       → Fastify API (api:3001)
#   supabase.townmeetingmanager.com  → Kong (kong:8000) — PUBLIC Supabase API
#                                       the browser's supabase-js connects to
#                                       (auth, REST, realtime ws, storage)
#   studio.townmeetingmanager.com    → Supabase Studio (studio:3000) — IP-restricted
#   *.townmeetingmanager.com         → public portal SPA (per-town subdomain)
#
# The host-based infrastructure/nginx/portal.conf (session 10.01) is the
# legacy non-containerized variant; this file supersedes it for the
# docker-compose.production.yml deployment.
# ─────────────────────────────────────────────────────────────────────

user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout  65;
    client_max_body_size 10M;       # agenda packets / exhibit uploads
    server_tokens off;

    # ── Gzip ─────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1000;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript
               application/xml text/xml image/svg+xml application/manifest+json;

    # ── WebSocket upgrade map (Supabase Realtime) ────────────────────
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # ── Docker embedded DNS ──────────────────────────────────────────
    # Re-resolves proxy_pass targets (the $upstream_* vars below) at request
    # time, so Nginx tolerates API/Kong/Studio container restarts and starts
    # even if an upstream is momentarily unavailable.
    resolver 127.0.0.11 ipv6=off valid=10s;

    # ── Shared SSL settings (wildcard cert covers root + all subdomains) ─
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # ── Security headers applied to every response ───────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # =================================================================
    # HTTP :80 — health, ACME challenge, and redirect everything to HTTPS
    # =================================================================
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;

        # Container healthcheck (docker-compose.production.yml).
        location = /healthz { access_log off; return 200 "ok\n"; }

        # Let's Encrypt HTTP-01 fallback (DNS-01 is primary — see ssl-setup.sh).
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / { return 301 https://$host$request_uri; }
    }

    # =================================================================
    # app.townmeetingmanager.com — admin / board member SPA
    # =================================================================
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;
        server_name app.townmeetingmanager.com;

        ssl_certificate     /etc/letsencrypt/live/townmeetingmanager.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/townmeetingmanager.com/privkey.pem;

        root /var/www/web;
        index index.html;

        location = /health { access_log off; return 200 "ok\n"; }

        # Hashed assets — cache hard. Service worker — never cache.
        location /assets/ { expires 1y; add_header Cache-Control "public, immutable"; try_files $uri =404; }
        location = /sw.js { add_header Cache-Control "no-cache"; try_files $uri =404; }

        location / { try_files $uri /index.html; }
    }

    # =================================================================
    # api.townmeetingmanager.com — Fastify API
    # =================================================================
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;
        server_name api.townmeetingmanager.com;

        ssl_certificate     /etc/letsencrypt/live/townmeetingmanager.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/townmeetingmanager.com/privkey.pem;

        set $upstream_api api:3001;

        location / {
            proxy_pass http://$upstream_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;   # PDF generation can be slow
        }
    }

    # =================================================================
    # supabase.townmeetingmanager.com — PUBLIC Supabase API (Kong)
    # This is VITE_SUPABASE_URL. Protected by JWT + RLS, not by Nginx.
    # WebSocket upgrade is required for Realtime.
    # =================================================================
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;
        server_name supabase.townmeetingmanager.com;

        ssl_certificate     /etc/letsencrypt/live/townmeetingmanager.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/townmeetingmanager.com/privkey.pem;

        client_max_body_size 50M;   # storage uploads

        set $upstream_kong kong:8000;

        location / {
            proxy_pass http://$upstream_kong;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_read_timeout 3600s;   # keep realtime sockets open
        }
    }

    # =================================================================
    # studio.townmeetingmanager.com — Supabase Studio (RESTRICTED)
    # Studio has no auth of its own — lock it to admin IPs.
    # =================================================================
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;
        server_name studio.townmeetingmanager.com;

        ssl_certificate     /etc/letsencrypt/live/townmeetingmanager.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/townmeetingmanager.com/privkey.pem;

        # Replace with your admin network / VPN range.
        allow 10.0.0.0/8;
        # allow 203.0.113.4;   # <-- admin static IP
        deny all;

        set $upstream_studio studio:3000;

        location / {
            proxy_pass http://$upstream_studio;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }
    }

    # =================================================================
    # *.townmeetingmanager.com — public portal (per-town subdomain)
    # Regex server_name; exact hosts above are matched first by Nginx.
    # =================================================================
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;
        server_name ~^(?<subdomain>[^.]+)\.townmeetingmanager\.com$;

        ssl_certificate     /etc/letsencrypt/live/townmeetingmanager.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/townmeetingmanager.com/privkey.pem;

        root /var/www/web;
        index index.html;

        set $upstream_api api:3001;

        location /assets/ { expires 1y; add_header Cache-Control "public, immutable"; try_files $uri =404; }

        # SEO endpoints resolve the town from the subdomain header.
        location = /sitemap.xml {
            proxy_pass http://$upstream_api/api/portal/sitemap;
            proxy_set_header Host $host;
            proxy_set_header X-Town-Subdomain $subdomain;
            add_header Cache-Control "public, max-age=3600";
        }
        location = /robots.txt {
            proxy_pass http://$upstream_api/api/portal/robots;
            proxy_set_header Host $host;
            proxy_set_header X-Town-Subdomain $subdomain;
            add_header Cache-Control "public, max-age=86400";
        }

        location /api/ {
            proxy_pass http://$upstream_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Town-Subdomain $subdomain;
        }

        # SPA fallback — the app reads the subdomain and renders the portal.
        location / { try_files $uri /index.html; }
    }
}
