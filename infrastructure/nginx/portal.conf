# ─────────────────────────────────────────────────────────────
# Town Meeting Manager — Public Portal (wildcard subdomains)
#
# Handles: *.townmeetingmanager.com
# Excludes: app, api, supabase (served by their own server blocks)
#
# Each town gets a subdomain (e.g., newcastle.townmeetingmanager.com)
# that resolves to the same SPA. The React app detects the subdomain
# from window.location.hostname and renders the portal UI.
# ─────────────────────────────────────────────────────────────

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;

    # Wildcard match — catches all subdomains not matched by other
    # server blocks (app., api., supabase. have their own blocks
    # with exact server_name and are matched first by Nginx).
    server_name ~^(?<subdomain>[^.]+)\.townmeetingmanager\.com$;

    # ── SSL (wildcard certificate from Let's Encrypt) ────────
    ssl_certificate     /etc/letsencrypt/live/townmeetingmanager.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/townmeetingmanager.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # ── Security headers ─────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Pass subdomain as header (available to the app if needed)
    proxy_set_header X-Town-Subdomain $subdomain;

    # ── Static assets (SPA build output) ─────────────────────
    root /var/www/townmeetingmanager/web;
    index index.html;

    # Cache static assets aggressively (hashed filenames)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── API proxy ────────────────────────────────────────────
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Town-Subdomain $subdomain;
    }

    # ── SPA fallback ─────────────────────────────────────────
    # All other paths serve index.html (client-side routing)
    location / {
        try_files $uri /index.html;
    }

    # ── Gzip ─────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1000;
    gzip_vary on;
}

# ── HTTP → HTTPS redirect ───────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name ~^(?<subdomain>[^.]+)\.townmeetingmanager\.com$;
    return 301 https://$host$request_uri;
}
