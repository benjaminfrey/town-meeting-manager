# PowerSync Sync Rules for Town Meeting Manager
# ─────────────────────────────────────────────────────────────────────
#
# MULTI-TENANT ISOLATION:
# All data is scoped by town_id extracted from the user's JWT claims.
# A user only receives data for their own town — never another town's data.
#
# The JWT token_parameters.town_id claim is set by a Supabase access token
# hook (configured in session 01.08). Until that hook is in place, PowerSync
# will report "no token parameters" which is expected.
#
# BUCKET DEFINITIONS:
# 1. town_data          — the user's own town record
# 2. people_data        — persons, user accounts, boards, and board members
# 3. meeting_data       — meetings, agenda items, motions, votes, attendance
# 4. minutes_data       — minutes documents and sections
# 5. template_data      — agenda templates and exhibits
# 6. notification_data  — notification events, delivery records, subscriber prefs
# 7. admin_data         — permission templates (system + town) and audit log
#
# Every query filters by town_id = bucket.town_id for tenant isolation.
# ─────────────────────────────────────────────────────────────────────

bucket_definitions:

  # ─── TOWN DATA ───────────────────────────────────────────────────
  # The user's own town record. Every authenticated user gets this.
  town_data:
    parameters:
      - SELECT request.jwt() ->> 'town_id' as town_id
    data:
      - SELECT id, name, state, municipality_type, population_range,
               contact_name, contact_role, meeting_formality, minutes_style,
               presiding_officer_default, minutes_recorder_default,
               staff_roles_present, subdomain, seal_url,
               retention_policy_acknowledged_at,
               created_at, updated_at
        FROM town
        WHERE id = bucket.town_id

  # ─── PEOPLE & ACCOUNTS ──────────────────────────────────────────
  # All persons, user accounts, boards, and board members for the user's town.
  # Staff and admin see all; board members need fellow members for meeting context.
  people_data:
    parameters:
      - SELECT request.jwt() ->> 'town_id' as town_id
    data:
      - SELECT id, town_id, name, email, created_at, archived_at
        FROM person
        WHERE town_id = bucket.town_id

      - SELECT id, person_id, town_id, role, gov_title, permissions,
               auth_user_id, created_at, archived_at
        FROM user_account
        WHERE town_id = bucket.town_id

      - SELECT id, town_id, name, board_type, member_count,
               election_method, officer_election_method, district_based,
               staggered_terms, is_governing_board, meeting_formality_override,
               minutes_style_override, elected_or_appointed, seat_titles,
               quorum_type, quorum_value, motion_display_format,
               created_at, archived_at
        FROM board
        WHERE town_id = bucket.town_id

      - SELECT id, person_id, board_id, town_id, seat_title,
               term_start, term_end, status, is_default_rec_sec, created_at
        FROM board_member
        WHERE town_id = bucket.town_id

  # ─── MEETINGS ──────────────────────────────────────────────────
  # All meetings, agenda items, motions, votes, and attendance for the user's town.
  meeting_data:
    parameters:
      - SELECT request.jwt() ->> 'town_id' as town_id
    data:
      - SELECT id, board_id, town_id, title, meeting_type, scheduled_date,
               scheduled_time, location, status, agenda_status,
               formality_override, started_at, ended_at,
               current_agenda_item_id, presiding_officer_id, recording_secretary_id,
               agenda_packet_url, meeting_notice_url,
               agenda_packet_generated_at, meeting_notice_generated_at,
               adjournment,
               created_by, created_at, updated_at
        FROM meeting
        WHERE town_id = bucket.town_id

      - SELECT id, meeting_id, town_id, section_type, sort_order, title,
               description, presenter, estimated_duration, parent_item_id,
               status, staff_resource, background, recommendation,
               suggested_motion, operator_notes, created_at, updated_at
        FROM agenda_item
        WHERE town_id = bucket.town_id

      - SELECT id, agenda_item_id, meeting_id, town_id, motion_text,
               motion_type, moved_by, seconded_by, status,
               parent_motion_id, vote_summary, created_at
        FROM motion
        WHERE town_id = bucket.town_id

      - SELECT id, motion_id, meeting_id, town_id, board_member_id,
               vote, recusal_reason, created_at
        FROM vote_record
        WHERE town_id = bucket.town_id

      - SELECT id, meeting_id, town_id, board_member_id, person_id,
               status, is_recording_secretary, arrived_at, departed_at
        FROM meeting_attendance
        WHERE town_id = bucket.town_id

      - SELECT id, meeting_id, agenda_item_id, town_id, name,
               address, topic, created_at
        FROM guest_speaker
        WHERE town_id = bucket.town_id

      - SELECT id, meeting_id, agenda_item_id, town_id,
               started_at, ended_at
        FROM agenda_item_transition
        WHERE town_id = bucket.town_id

      - SELECT id, meeting_id, agenda_item_id, town_id, statutory_basis,
               entered_at, exited_at, entry_motion_id,
               post_session_action_motion_ids, created_at
        FROM executive_session
        WHERE town_id = bucket.town_id

      - SELECT id, board_id, town_id, source_meeting_id, source_agenda_item_id,
               title, description, source, status, dismissed_reason,
               placed_agenda_item_id, created_at
        FROM future_item_queue
        WHERE town_id = bucket.town_id

  # ─── MINUTES ───────────────────────────────────────────────────
  # Minutes documents and their sections for the user's town.
  minutes_data:
    parameters:
      - SELECT request.jwt() ->> 'town_id' as town_id
    data:
      - SELECT id, meeting_id, town_id, status, content_json,
               html_rendered, pdf_storage_path, generated_by,
               approved_at, approved_by_motion_id, created_at, updated_at
        FROM minutes_document
        WHERE town_id = bucket.town_id

      - SELECT id, minutes_document_id, town_id, section_type,
               sort_order, title, content_json, source_agenda_item_id,
               created_at, updated_at
        FROM minutes_section
        WHERE town_id = bucket.town_id

  # ─── TEMPLATES & EXHIBITS ───────────────────────────────────────
  # Agenda templates and exhibit attachments for the user's town.
  template_data:
    parameters:
      - SELECT request.jwt() ->> 'town_id' as town_id
    data:
      - SELECT id, board_id, town_id, name, is_default, sections,
               created_at, updated_at
        FROM agenda_template
        WHERE town_id = bucket.town_id

      - SELECT id, agenda_item_id, town_id, title, file_storage_path,
               file_type, file_size, file_name, exhibit_type, visibility,
               uploaded_by, sort_order, created_at
        FROM exhibit
        WHERE town_id = bucket.town_id

  # ─── NOTIFICATIONS ───────────────────────────────────────────
  # Notification events and delivery records for the user's town.
  # Subscriber preferences sync so the app can display/edit them offline.
  notification_data:
    parameters:
      - SELECT request.jwt() ->> 'town_id' as town_id
    data:
      - SELECT id, town_id, event_type, entity_type, entity_id,
               payload, status, created_at, processed_at
        FROM notification_event
        WHERE town_id = bucket.town_id

      - SELECT id, event_id, town_id, subscriber_id, channel,
               status, external_id, error_message, sent_at, created_at
        FROM notification_delivery
        WHERE town_id = bucket.town_id

      - SELECT id, person_id, town_id, event_type, channel_email,
               channel_sms, sms_consent, sms_consent_at, created_at
        FROM subscriber_notification_preference
        WHERE town_id = bucket.town_id

  # ─── ADMIN DATA ──────────────────────────────────────────────
  # Permission templates (town-specific only; system defaults are
  # bundled in the client app) and audit log.
  admin_data:
    parameters:
      - SELECT request.jwt() ->> 'town_id' as town_id
    data:
      - SELECT id, town_id, name, description, permissions,
               is_system_default, created_at
        FROM permission_template
        WHERE town_id = bucket.town_id

      - SELECT id, town_id, user_account_id, action, entity_type,
               entity_id, details, created_at
        FROM audit_log
        WHERE town_id = bucket.town_id
